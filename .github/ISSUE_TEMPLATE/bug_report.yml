name: 🐞 Баг / Bug report
description: Что-то сломано или выглядит неправильно / Something is broken or looks wrong
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Обязательных полей шесть, и почти все — в один клик. Остальное заполняйте, только если знаете:
        короткий отчёт лучше ненаписанного.

        Six required fields, most of them one click. Fill in the rest only if you know it — a short
        report beats one you didn't send.

  - type: checkboxes
    id: preflight
    attributes:
      label: Проверки перед отправкой / Pre-flight checks
      options:
        - label: Поискал среди [существующих issue](https://github.com/VizzleTF/luci-theme-footstrap/issues?q=is%3Aissue) — дубликата нет / I searched existing issues, no duplicate
          required: true
        - label: Стоит последняя версия темы из [релизов](https://github.com/VizzleTF/luci-theme-footstrap/releases), сделал жёсткую перезагрузку (Ctrl+Shift+R) — баг остался / I am on the latest release and did a hard reload, the bug is still there
          required: true
        - label: Расширения, меняющие вид страниц (Dark Reader, Stylus…), отключены — баг остался / Extensions that restyle pages (Dark Reader, Stylus…) are off, the bug persists

  - type: dropdown
    id: release
    attributes:
      label: Релиз OpenWrt / OpenWrt release
      description: |
        Написан в подвале LuCI, на любой странице — ssh не нужен. Это важно: часть страниц LuCI
        рисует на 24.10 и 25.12 разной разметкой, а тема отдаёт один стиль на обе, так что баг может
        быть только на вашей ветке.

        It is in the LuCI footer on any page — no ssh needed. This matters: LuCI renders some pages
        with different markup on 24.10 and 25.12 while the theme ships one stylesheet for both, so a
        bug can exist on your branch only.
      options:
        - "24.10"
        - "25.12 или новее / or newer"
        - Snapshot / master
        - Не знаю / Not sure
    validations:
      required: true

  - type: input
    id: theme-version
    attributes:
      label: Версия темы / Theme version
      description: Показана в поповере Appearance. / Shown in the Appearance popover.
      placeholder: "0.9.1"
    validations:
      required: true

  - type: input
    id: page-path
    attributes:
      label: Адрес страницы / Page path
      placeholder: "/cgi-bin/luci/admin/network/firewall/forwards"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: Что не так и как повторить / What's wrong and how to reproduce
      description: Что видите, что ожидали и куда нажать, чтобы увидеть то же самое. / What you see, what you expected, and what to click to see it too.
      placeholder: |
        Вижу: у правил не отображаются названия — первый столбец пустой.
        Ожидал: имя правила, как на стоковой теме.
        Повторить: Сеть → Межсетевой экран → Перенаправление портов.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Скриншоты / Screenshots
      description: |
        Перетащите картинки прямо в это поле. По описанию вёрстку не воспроизвести.
        Если можно — такой же кадр на стоковой теме `luci-theme-bootstrap` для сравнения.

        Drag & drop images here — a layout bug cannot be reproduced from prose alone. If you can,
        add the same shot on the stock `luci-theme-bootstrap` for comparison.
    validations:
      required: true

  - type: dropdown
    id: stock-theme
    attributes:
      label: Есть ли баг на стоковой теме luci-theme-bootstrap? / Does it also happen on stock luci-theme-bootstrap?
      description: Если да — это, скорее всего, баг самого LuCI или пакета, а не темы. / If yes, it is most likely a LuCI or package bug, not a theme bug.
      options:
        - Нет, только на footstrap / No, footstrap only
        - Да, на стоковой теме тоже / Yes, on the stock theme too
        - Не проверял / Not checked
    validations:
      required: true

  - type: dropdown
    id: appearance
    attributes:
      label: Раскладка, палитра, режим / Layout, palette, mode
      description: Всё это переключается в поповере Appearance. Отметьте, на чём видно баг. / All of these live in the Appearance popover. Tick whatever the bug shows on.
      multiple: true
      options:
        - "Раскладка / Layout: боковое меню / sidebar"
        - "Раскладка / Layout: верхнее меню / top"
        - "Палитра / Palette: Footstrap"
        - "Палитра / Palette: Hi-Contrast"
        - "Палитра / Palette: Rvht (коты / cats)"
        - "Режим / Mode: тёмный / dark"
        - "Режим / Mode: светлый / light"

  - type: dropdown
    id: viewport
    attributes:
      label: Устройство / экран / Device & viewport
      multiple: true
      options:
        - Десктоп / Desktop (>1200px)
        - Ноутбук / Laptop (992–1200px)
        - Планшет / Tablet (768–992px)
        - Телефон / Phone (<768px)

  - type: input
    id: package-link
    attributes:
      label: Ссылка на сторонний пакет / Third-party package link
      description: Только если страница из стороннего `luci-app-*` — без исходников виджет нечем воспроизвести. Пусто = стоковая страница LuCI. / Only if the page comes from a third-party `luci-app-*` — the widget cannot be reproduced without its source. Empty = a stock LuCI page.
      placeholder: "luci-app-podkop — https://github.com/itdoginfo/podkop"

  - type: input
    id: browser
    attributes:
      label: Браузер / Browser
      placeholder: "Chrome 150 / Firefox 152 / Safari 18 / Edge 150"

  - type: input
    id: luci-lang
    attributes:
      label: Язык интерфейса LuCI / LuCI UI language
      description: Длинные подписи, CJK и RTL ломают вёрстку иначе, чем английские. / Long labels, CJK and RTL break layout differently than English.
      placeholder: "Русский / English / 中文 …"

  - type: textarea
    id: board
    attributes:
      label: Роутер и прошивка / Router & firmware
      description: |
        Если есть доступ по ssh — вывод `ubus call system board`. Показывает модель, ядро и сборку
        (OpenWrt, iStoreOS, ImmortalWrt…), а на форках поведение отличается.

        If you have ssh access — the output of `ubus call system board`. It shows the model, the
        kernel and the build (OpenWrt, iStoreOS, ImmortalWrt…), and forks behave differently.
      render: json

  - type: textarea
    id: extra
    attributes:
      label: Что-нибудь ещё / Anything else
      description: |
        Красные строки из консоли (F12 → Console), регрессия (на какой версии темы работало),
        кастомный CSS, LuCI за реверс-прокси, необычный zoom — всё, что может влиять.

        Red lines from the console (F12 → Console), a regression (which theme version was the last
        good one), custom CSS, LuCI behind a reverse proxy, unusual zoom — anything that could matter.
