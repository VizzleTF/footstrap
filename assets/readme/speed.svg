<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="sp-t sp-d">
  <title id="sp-t">Navigation benchmark: footstrap against luci-theme-bootstrap</title>
  <desc id="sp-d">Time to first paint on the same router and the same pages. Wireless 288 ms to 16 ms, Interfaces 367 to 63, DNS 328 to 84, Firewall zones 300 to 88. Whole 36-page run 7458 ms to 3196 ms, 2.33 times.</desc>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Manrope,sans-serif">
    <rect width="1200" height="430" rx="24" fill="#1c2128" stroke="#444c56"/>

    <text x="48" y="64" fill="#e6edf3" font-size="34" font-weight="800" letter-spacing="-1">Same router, same pages, first paint</text>
    <text x="48" y="96" fill="#8f9cab" font-size="19" font-weight="600">36 pages · 3 runs · warmed cache · OpenWrt 25.12 · Chromium/Playwright</text>

    <g font-size="18" font-weight="700">
      <rect x="880" y="46" width="14" height="14" rx="4" fill="#8f9cab"/>
      <text x="904" y="59" fill="#8f9cab">luci-theme-bootstrap</text>
      <rect x="880" y="76" width="14" height="14" rx="4" fill="#569df5"/>
      <text x="904" y="89" fill="#569df5">footstrap</text>
    </g>

    <g font-size="20" font-weight="600" fill="#adbac7">
      <text x="48" y="164">Wireless status</text>
      <text x="48" y="220">Interfaces</text>
      <text x="48" y="276">DNS</text>
      <text x="48" y="332">Firewall zones</text>
    </g>

    <g>
      <!-- 1.75 units per millisecond -->
      <rect x="300" y="140" width="504" height="14" rx="7" fill="#8f9cab"/>
      <rect x="300" y="162" width="28"  height="14" rx="7" fill="#569df5"/>
      <text x="820" y="152" fill="#8f9cab" font-size="18" font-weight="700">288 ms</text>
      <text x="344" y="174" fill="#569df5" font-size="18" font-weight="700">16 ms · 17.5×</text>

      <rect x="300" y="196" width="642" height="14" rx="7" fill="#8f9cab"/>
      <rect x="300" y="218" width="110" height="14" rx="7" fill="#569df5"/>
      <text x="958" y="208" fill="#8f9cab" font-size="18" font-weight="700">367 ms</text>
      <text x="426" y="230" fill="#569df5" font-size="18" font-weight="700">63 ms · 5.8×</text>

      <rect x="300" y="252" width="574" height="14" rx="7" fill="#8f9cab"/>
      <rect x="300" y="274" width="147" height="14" rx="7" fill="#569df5"/>
      <text x="890" y="264" fill="#8f9cab" font-size="18" font-weight="700">328 ms</text>
      <text x="463" y="286" fill="#569df5" font-size="18" font-weight="700">84 ms · 3.9×</text>

      <rect x="300" y="308" width="525" height="14" rx="7" fill="#8f9cab"/>
      <rect x="300" y="330" width="154" height="14" rx="7" fill="#569df5"/>
      <text x="841" y="320" fill="#8f9cab" font-size="18" font-weight="700">300 ms</text>
      <text x="470" y="342" fill="#569df5" font-size="18" font-weight="700">88 ms · 3.4×</text>
    </g>

    <path d="M48 368h1104" stroke="#444c56"/>
    <text x="48" y="402" fill="#adbac7" font-size="20" font-weight="600">Whole run <tspan fill="#e6edf3" font-weight="800">7458 ms → 3196 ms (2.33×)</tspan> · median page <tspan fill="#e6edf3" font-weight="800">3.04×</tspan> · requests per page <tspan fill="#e6edf3" font-weight="800">15–48 → 0–8</tspan></text>
  </g>
</svg>
